name: Build Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the Windows build to (e.g. v1.1.1)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package Windows
        run: npx electron-builder --win --publish never

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.inputs.tag }} release/*.exe --clobber
